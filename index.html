<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #080f08; --card: #0f1a0f; --card2: #0d150d;
  --green: #39ff14; --green2: #2ecc71; --green3: #1a6b1a;
  --gold: #c9a84c; --white: #f0f0ee; --gray: #7a8a7a;
  --red: #e74c3c; --border: #1f3a1f;
}
body { background: var(--bg); color: var(--white); font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; min-height: 100vh; padding-bottom: env(safe-area-inset-bottom); }

/* HEADER */
.header { background: linear-gradient(180deg,#0a1a0a,var(--bg)); border-bottom: 1px solid var(--border); padding: 12px 16px 10px; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 100; }
.logo { width: 36px; height: 36px; border-radius: 50%; border: 1.5px solid var(--gold); object-fit: cover; flex-shrink: 0; }
.header h1 { font-size: 15px; font-weight: 700; color: var(--white); }
.header p { font-size: 11px; color: var(--gray); }

/* UPLOAD */
.upload-section { padding: 16px 16px 0; }
.upload-label { display: block; border: 2px dashed var(--green3); border-radius: 14px; padding: 24px 16px; text-align: center; cursor: pointer; background: var(--card); transition: all .2s; position: relative; overflow: hidden; }
.upload-label.has-image { border: 2px solid var(--green); padding: 0; }
.upload-label:active { opacity: .8; }
.upload-icon { font-size: 32px; margin-bottom: 8px; display: block; }
.upload-label h2 { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.upload-label p { font-size: 12px; color: var(--gray); }
#preview-img { width: 100%; display: none; border-radius: 12px; }
#file-input { display: none; }

/* FILTERS */
.filter-bar { padding: 12px 16px 0; display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; }
.filter-bar::-webkit-scrollbar { display: none; }
.filter-btn { flex-shrink: 0; padding: 7px 13px; border-radius: 18px; border: 1.5px solid var(--border); background: var(--card); color: var(--gray); font-size: 12px; font-weight: 500; cursor: pointer; transition: all .2s; }
.filter-btn.active { border-color: var(--green); background: var(--green3); color: var(--white); }

/* ANALYZE BTN */
.analyze-wrap { padding: 14px 16px; }
.analyze-btn { width: 100%; padding: 15px; background: var(--green); color: var(--bg); border: none; border-radius: 13px; font-size: 16px; font-weight: 700; cursor: pointer; letter-spacing: .3px; transition: opacity .2s; }
.analyze-btn:disabled { opacity: .35; cursor: not-allowed; }
.analyze-btn:active:not(:disabled) { opacity: .8; }

/* LOADING */
.loading { display: none; padding: 28px 16px; text-align: center; }
.spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 14px; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading p { color: var(--gray); font-size: 13px; }

/* RESULTS */
.results { padding: 0 16px; display: none; }
.results-header { font-size: 11px; font-weight: 600; color: var(--gray); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; padding-top: 2px; }
.match-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; margin-bottom: 10px; overflow: hidden; }
.match-card.strong { border-color: var(--green); box-shadow: 0 0 18px rgba(57,255,20,.07); }
.match-card.good { border-color: var(--green3); }
.match-header { padding: 12px 14px 8px; display: flex; justify-content: space-between; align-items: flex-start; }
.match-teams .home { font-size: 14px; font-weight: 600; }
.match-teams .away { font-size: 12px; color: var(--gray); margin-top: 2px; }
.signal-badge { padding: 4px 9px; border-radius: 18px; font-size: 10px; font-weight: 700; flex-shrink: 0; margin-left: 8px; }
.signal-badge.eros { background: var(--green); color: var(--bg); }
.signal-badge.jo { background: var(--green3); color: var(--white); }
.signal-badge.figyelni { background: #c07020; color: var(--white); }
.signal-badge.kihagyni { background: #222; color: var(--gray); }
.match-odds { display: flex; gap: 6px; padding: 0 14px 10px; }
.odds-pill { flex: 1; background: var(--card2); border-radius: 9px; padding: 7px 4px; text-align: center; border: 1px solid var(--border); }
.odds-pill.recommended { border-color: var(--green); background: rgba(57,255,20,.07); }
.odds-pill .odds-label { font-size: 9px; color: var(--gray); margin-bottom: 2px; }
.odds-pill .odds-val { font-size: 15px; font-weight: 700; }
.odds-pill.recommended .odds-val { color: var(--green); }
.match-stats { padding: 8px 14px 12px; border-top: 1px solid var(--border); display: flex; flex-wrap: wrap; gap: 6px; }
.stat-chip { display: flex; align-items: center; gap: 4px; background: var(--card2); border-radius: 7px; padding: 4px 8px; font-size: 10px; color: var(--gray); }
.stat-chip .val { font-weight: 600; color: var(--white); }
.stat-chip .val.green { color: var(--green2); }
.stat-chip .val.gold { color: var(--gold); }
.stat-chip .val.red { color: var(--red); }
.rec-row { padding: 8px 14px 12px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
.rec-icon { font-size: 16px; flex-shrink: 0; }
.rec-text { font-size: 12px; color: var(--gray); line-height: 1.4; }
.rec-text strong { color: var(--white); font-weight: 600; }
.rec-text .green { color: var(--green); }
.no-results { display: none; padding: 28px 16px; text-align: center; }
.no-results p { color: var(--gray); font-size: 13px; }
.error-box { display: none; margin: 12px 16px; background: rgba(231,76,60,.1); border: 1px solid var(--red); border-radius: 10px; padding: 12px 14px; font-size: 12px; color: var(--red); line-height: 1.4; }
</style>
</head>

function getGoalPrediction(hazai, vendeg) {
  const key1 = hazai + " vs " + vendeg;
  const key2 = vendeg + " vs " + hazai;
  const d = GOL_ELOSZLAS[key1] || GOL_ELOSZLAS[key2] || null;
  if (!d) return null;
  return d;
}

function getBucket(odds) {
  const low = Math.floor(odds*2)/2;
  return `${low.toFixed(2)}-${(low+0.49).toFixed(2)}`;
}
function getOddsStats(piac, odds) {
  return (ODDS_ROI[piac]||{})[getBucket(odds)]||null;
}
function getSignal(roi, csapatStat, mode) {
  if (mode==="roi") {
    if (roi>=30) return "eros"; if (roi>=10) return "jo";
    if (roi>=0) return "figyelni"; return "kihagyni";
  }
  if (mode==="win") {
    if (!csapatStat) return "figyelni";
    if (csapatStat.gyoz>=65) return "eros"; if (csapatStat.gyoz>=50) return "jo";
    if (csapatStat.gyoz>=35) return "figyelni"; return "kihagyni";
  }
  if (mode==="goals") return "figyelni"; // handled separately
  let s=0;
  if (roi>=30) s+=3; else if (roi>=10) s+=2; else if (roi>=0) s+=1;
  if (csapatStat) { if (csapatStat.gyoz>=65) s+=3; else if (csapatStat.gyoz>=50) s+=2; else if (csapatStat.gyoz>=35) s+=1; }
  if (s>=5) return "eros"; if (s>=3) return "jo"; if (s>=2) return "figyelni"; return "kihagyni";
}
function signalLabel(s) { return {eros:"🔥 ERŐS",jo:"✅ JÓ",figyelni:"👀 FIGYELNI",kihagyni:"⛔ KIHAGYNI"}[s]; }
function signalIcon(s) { return {eros:"🔥",jo:"✅",figyelni:"👀",kihagyni:"⛔"}[s]; }

async function analyze() {
  if (!imageBase64) return;
  document.getElementById("loading").style.display="block";
  document.getElementById("results").style.display="none";
  document.getElementById("no-results").style.display="none";
  document.getElementById("error-box").style.display="none";
  document.getElementById("cards-container").innerHTML="";
  analyzeBtn.disabled=true;

  const apiKey = apiKeyInput.value.trim() || localStorage.getItem("coh_api_key") || "";
  if (!apiKey || !apiKey.startsWith("sk-ant-")) {
    document.getElementById("loading").style.display="none";
    const eb=document.getElementById("error-box");
    eb.style.display="block";
    eb.textContent="Adj meg érvényes Claude API kulcsot! (sk-ant-... kezdetű)";
    analyzeBtn.disabled=false;
    return;
  }

  if (!images.length) { analyzeBtn.disabled=false; return; }

  try {
    const prompt=`Ez egy vagy több Tippmixpro Virtuális Premier League képernyőkép.
Olvasd ki AZ ÖSSZES látható mérkőzést és oddsokat az összes képről.
Válaszolj CSAK JSON formátumban, semmi más szöveg:
{"meccsek":[{"hazai":"csapatnév","vendeg":"csapatnév","hazai_odds":3.15,"dontetlen_odds":3.40,"vendeg_odds":2.00}]}
Ha nem látható egy érték, írd null-t. Csapatneveket magyarul add meg. Ne ismételj meccseket.`;

    // Build content array with all images
    const msgContent = images.map(img=>({
      type:"image",source:{type:"base64",media_type:img.mediaType,data:img.base64}
    }));
    msgContent.push({type:"text",text:prompt});

    const resp=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({
        model:"claude-sonnet-4-6",max_tokens:2000,
        messages:[{role:"user",content:msgContent}]
      })
    });
    const data=await resp.json();
    const text=data.content.map(i=>i.text||"").join("");
    const clean=text.replace(/```json|```/g,"").trim();
    const parsed=JSON.parse(clean);
    renderResults(parsed.meccsek||[]);
  } catch(err) {
    document.getElementById("loading").style.display="none";
    const eb=document.getElementById("error-box");
    eb.style.display="block"; eb.textContent="Hiba: "+err.message;
  }
  analyzeBtn.disabled=false;
}

function renderResults(meccsek) {
  document.getElementById("loading").style.display="none";
  if (!meccsek.length) { document.getElementById("no-results").style.display="block"; return; }
  const container=document.getElementById("cards-container");
  const mode=selectedMode;
  const order={eros:4,jo:3,figyelni:2,kihagyni:1};
  const analyzed=meccsek.map(m=>{
    const opts=[
      {piac:"hazai",odds:m.hazai_odds,label:"Hazai",csapatStat:CSAPAT_HAZAI[m.hazai]},
      {piac:"döntetlen",odds:m.dontetlen_odds,label:"Döntetlen",csapatStat:null},
      {piac:"vendég",odds:m.vendeg_odds,label:"Vendég",csapatStat:CSAPAT_VENDEG[m.vendeg]},
    ];
    let best=null,bestScore=-999;
    opts.forEach(opt=>{
      if (!opt.odds) return;
      const stats=getOddsStats(opt.piac,opt.odds);
      const roi=stats?stats.roi:-50;
      const sig=getSignal(roi,opt.csapatStat,mode);
      const sc=order[sig]*10+roi/10;
      if (sc>bestScore) { bestScore=sc; best={...opt,stats,roi,signal:sig}; }
    });
    return {...m,best};

          <div class="stat-chip">Átlag gól <span class="val gold">${gol.atlag}</span></div>

        </div>
        <div class="rec-row">
          <span class="rec-icon">⚽</span>
          <div class="rec-text">Várható eredmény: <strong class="green">${gol.legval}</strong> – átlag ${gol.atlag} gól/meccs.</div>
        </div>` : `
        <div class="rec-row">
          <span class="rec-icon">❓</span>

      container.appendChild(card);

    card.className=`match-card ${b.signal==="eros"?"strong":b.signal==="jo"?"good":""}`;

    let recText="";
    if (b.signal==="eros") recText=`<strong class="green">FOGADJ – ${b.label} ${b.odds} oddsra!</strong> Historikusan erős zóna.`;
    else if (b.signal==="jo") recText=`<strong>${b.label} ${b.odds}</strong> – jó lehetőség.`;
    else if (b.signal==="figyelni") recText=`<strong>${b.label} ${b.odds}</strong> – gyenge jelzés.`;
    else recText=`Egyik piac sem ajánlott.`;
    card.innerHTML=`
      <div class="match-header">
        <div class="match-teams"><div class="home">${m.hazai||"?"}</div><div class="away">${m.vendeg||"?"}</div></div>
        <span class="signal-badge ${b.signal}">${signalLabel(b.signal)}</span>
      </div>
      <div class="match-odds">
        <div class="odds-pill ${b.piac==="hazai"&&b.signal!=="kihagyni"?"recommended":""}">
          <div class="odds-label">Hazai</div><div class="odds-val">${m.hazai_odds||"-"}</div></div>
        <div class="odds-pill ${b.piac==="döntetlen"&&b.signal!=="kihagyni"?"recommended":""}">
          <div class="odds-label">Döntetlen</div><div class="odds-val">${m.dontetlen_odds||"-"}</div></div>
        <div class="odds-pill ${b.piac==="vendég"&&b.signal!=="kihagyni"?"recommended":""}">
          <div class="odds-label">Vendég</div><div class="odds-val">${m.vendeg_odds||"-"}</div></div>
      </div>
      <div class="match-stats">
        ${b.stats?`<div class="stat-chip">ROI <span class="val ${b.stats.roi>0?"green":"red"}">${b.stats.roi>0?"+":""}${b.stats.roi}%</span></div>`:""}
        ${b.stats?`<div class="stat-chip">Találat <span class="val gold">${b.stats.hit}%</span></div>`:""}
        ${csText?`<div class="stat-chip">Csapat <span class="val green">${csText}</span></div>`:""}
        ${b.stats?`<div class="stat-chip">Minta <span class="val">${b.stats.bets} meccs</span></div>`:""}
      </div>
      <div class="rec-row">
        <span class="rec-icon">${signalIcon(b.signal)}</span>
        <div class="rec-text">${recText}</div>
      </div>`;
    container.appendChild(card);
  });
  document.getElementById("results").style.display="block";
}
</script>
</body>
</html>
